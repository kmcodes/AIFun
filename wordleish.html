<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordleish</title>
<style>
  :root{
    --bg:#f7f4ec; --tile-border:#d3cec0; --tile-filled:#b9b2a1; --text:#3a3630;
    --muted:#8a8375; --key:#e5e0d3; --key-text:#3a3630;
    --good:#5c9c5e; --near:#c9a24b; --absent:#807a6d; --onfb:#ffffff;
    --toast-bg:#3a3630; --toast-text:#f7f4ec;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#171a21; --tile-border:#3a3f4d; --tile-filled:#565e73; --text:#e8e9ee;
    --muted:#7d8296; --key:#3a3f4d; --key-text:#e8e9ee;
    --good:#5c9c5e; --near:#c9a24b; --absent:#2c303b; --onfb:#f2f3f7;
    --toast-bg:#e8e9ee; --toast-text:#171a21;
  }}
  :root[data-theme="dark"]{
    --bg:#171a21; --tile-border:#3a3f4d; --tile-filled:#565e73; --text:#e8e9ee;
    --muted:#7d8296; --key:#3a3f4d; --key-text:#e8e9ee;
    --good:#5c9c5e; --near:#c9a24b; --absent:#2c303b; --onfb:#f2f3f7;
    --toast-bg:#e8e9ee; --toast-text:#171a21;
  }
  :root[data-theme="light"]{
    --bg:#f7f4ec; --tile-border:#d3cec0; --tile-filled:#b9b2a1; --text:#3a3630;
    --muted:#8a8375; --key:#e5e0d3; --key-text:#3a3630;
    --good:#5c9c5e; --near:#c9a24b; --absent:#807a6d; --onfb:#ffffff;
    --toast-bg:#3a3630; --toast-text:#f7f4ec;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
       min-height:100svh;display:flex;flex-direction:column;align-items:center}
  header{width:min(500px,100%);display:flex;align-items:center;gap:10px;
         padding:14px 16px 10px;border-bottom:1px solid var(--tile-border)}
  h1{font-size:22px;margin:0;letter-spacing:.14em;font-weight:800;flex:1}
  h1 span{color:var(--good)}
  .no{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .mode{font:600 12px/1 system-ui;letter-spacing:.08em;color:var(--key-text);
        background:var(--key);border:0;border-radius:6px;padding:9px 12px;cursor:pointer}
  .mode:hover{filter:brightness(1.06)}
  button:focus-visible{outline:2px solid var(--text);outline-offset:2px}

  main{display:flex;flex-direction:column;align-items:center;gap:14px;
       padding:18px 8px 24px;width:100%}
  #board{display:grid;grid-template-rows:repeat(6,1fr);gap:6px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .tile{width:min(62px,15.5vw);aspect-ratio:1;border:2px solid var(--tile-border);
        border-radius:4px;display:flex;align-items:center;justify-content:center;
        font-size:clamp(20px,6vw,30px);font-weight:800;text-transform:uppercase;
        transition:transform .08s}
  .tile.filled{border-color:var(--tile-filled)}
  .tile.pop{transform:scale(1.08)}
  .tile.good{background:var(--good);border-color:var(--good);color:var(--onfb)}
  .tile.near{background:var(--near);border-color:var(--near);color:var(--onfb)}
  .tile.absent{background:var(--absent);border-color:var(--absent);color:var(--onfb)}
  @media (prefers-reduced-motion: no-preference){
    .tile.reveal{animation:flip .5s ease}
    @keyframes flip{0%{transform:rotateX(0)}49%{transform:rotateX(90deg)}
                    51%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
    .row.shake{animation:shake .4s}
    @keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    .tile.dance{animation:dance .45s ease}
    @keyframes dance{50%{transform:translateY(-14px)}}
  }

  #kb{display:flex;flex-direction:column;gap:6px;width:min(500px,100%);padding:0 4px}
  .kbrow{display:flex;gap:5px;justify-content:center}
  .key{flex:1;max-width:44px;height:56px;border:0;border-radius:5px;background:var(--key);
       color:var(--key-text);font:700 14px/1 system-ui;text-transform:uppercase;
       cursor:pointer;display:flex;align-items:center;justify-content:center}
  .key.wide{max-width:70px;flex:1.6;font-size:11px}
  .key.good{background:var(--good);color:var(--onfb)}
  .key.near{background:var(--near);color:var(--onfb)}
  .key.absent{background:var(--absent);color:var(--onfb)}
  .key:active{filter:brightness(.92)}

  #toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);
         background:var(--toast-bg);color:var(--toast-text);font-weight:700;
         padding:10px 16px;border-radius:8px;opacity:0;pointer-events:none;
         transition:opacity .2s;z-index:5;max-width:90vw;text-align:center}
  #toast.show{opacity:1}

  #stats{width:min(420px,94%);border:1px solid var(--tile-border);border-radius:10px;
         padding:14px 18px;display:none;flex-direction:column;gap:10px}
  #stats.show{display:flex}
  #stats h2{margin:0;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .srow{display:flex;gap:18px;font-variant-numeric:tabular-nums}
  .srow div{text-align:center}
  .srow b{display:block;font-size:22px}
  .srow span{font-size:11px;color:var(--muted)}
  .dist{display:flex;flex-direction:column;gap:4px}
  .dbar{display:flex;align-items:center;gap:8px;font-size:12px;font-variant-numeric:tabular-nums}
  .dbar i{background:var(--good);color:var(--onfb);font-style:normal;font-weight:700;
          border-radius:3px;padding:2px 6px;min-width:14px;text-align:right}
  .actions{display:flex;gap:10px}
  .actions button{flex:1;font:700 13px/1 system-ui;letter-spacing:.06em;border:0;
                  border-radius:6px;padding:12px;cursor:pointer;background:var(--good);color:var(--onfb)}
  .actions button.alt{background:var(--key);color:var(--key-text)}
</style>

<header>
  <h1>WORDLE<span>ISH</span></h1>
  <span class="no" id="puzzno"></span>
  <button class="mode" id="modebtn">PRACTICE</button>
</header>
<main>
  <div id="board"></div>
  <div id="kb"></div>
  <section id="stats" aria-live="polite">
    <h2>Statistics</h2>
    <div class="srow">
      <div><b id="s-played">0</b><span>played</span></div>
      <div><b id="s-winpct">0</b><span>win %</span></div>
      <div><b id="s-streak">0</b><span>streak</span></div>
      <div><b id="s-max">0</b><span>best streak</span></div>
    </div>
    <div class="dist" id="dist"></div>
    <div class="actions">
      <button id="sharebtn">SHARE</button>
      <button class="alt" id="againbtn">PRACTICE GAME</button>
    </div>
  </section>
</main>
<div id="toast" role="status"></div>

const board=document.getElementById("board"), kb=document.getElementById("kb");
for(let r=0;r<6;r++){
  const row=document.createElement("div"); row.className="row";
  for(let c=0;c<5;c++){const t=document.createElement("div");t.className="tile";row.appendChild(t);}
  board.appendChild(row);
}
const KEYS=["qwertyuiop","asdfghjkl","!zxcvbnm<"];
for(const line of KEYS){
  const row=document.createElement("div"); row.className="kbrow";
  for(const ch of line){
    const b=document.createElement("button"); b.className="key";
    if(ch==="!"){b.classList.add("wide");b.textContent="enter";b.dataset.k="enter";}
    else if(ch==="<"){b.classList.add("wide");b.innerHTML="&#9003;";b.dataset.k="back";
      b.setAttribute("aria-label","backspace");}
    else{b.textContent=ch;b.dataset.k=ch;}
    b.addEventListener("click",()=>press(b.dataset.k));
    row.appendChild(b);
  }
  kb.appendChild(row);
}

function score(guess,tgt){
  const res=Array(5).fill("absent"), pool={};
  for(let i=0;i<5;i++) if(guess[i]!==tgt[i]) pool[tgt[i]]=(pool[tgt[i]]||0)+1;
  for(let i=0;i<5;i++){
    if(guess[i]===tgt[i]) res[i]="good";
    else if(pool[guess[i]]){res[i]="near";pool[guess[i]]--;}
  }
  return res;
}
const RANK={absent:1,near:2,good:3};
function paintKeys(){
  const best={};
  for(const g of guesses){
    const res=score(g,target);
    for(let i=0;i<5;i++)
      if((RANK[res[i]]||0)>(RANK[best[g[i]]]||0)) best[g[i]]=res[i];
  }
  document.querySelectorAll(".key").forEach(k=>{
    k.classList.remove("good","near","absent");
    if(best[k.dataset.k]) k.classList.add(best[k.dataset.k]);
  });
}
function paint(instant){
  for(let r=0;r<6;r++){
    const tiles=board.children[r].children;
    const g=guesses[r]||"";
    const active=r===guesses.length&&!done?cur:"";
    for(let c=0;c<5;c++){
      const t=tiles[c];
      t.className="tile"; t.textContent=g[c]||active[c]||"";
      if(t.textContent) t.classList.add("filled");
      if(g){
        const res=score(g,target)[c];
        if(instant||r<guesses.length-1){t.classList.add(res);}
        else{
          setTimeout(()=>{t.classList.add("reveal");
            setTimeout(()=>t.classList.add(res),250);},c*260);
        }
      }
    }
  }
  paintKeys();
}

// ---------------------------------------------------------------- game
let toastTimer=null;
function toast(msg,ms=1600){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  if(ms) toastTimer=setTimeout(()=>el.classList.remove("show"),ms);
}
function press(k){
  if(done) return;
  if(k==="enter") return submit();
  if(k==="back"){cur=cur.slice(0,-1);paint(true);return;}
  if(cur.length<5&&/^[a-z]$/.test(k)){
    cur+=k; paint(true);
    const t=board.children[guesses.length].children[cur.length-1];
    t.classList.add("pop"); setTimeout(()=>t.classList.remove("pop"),90);
  }
}
function submit(){
  if(cur.length<5) return nudge("Not enough letters");
  if(!VALID.has(cur)) return nudge("Not in word list");
  guesses.push(cur); const g=cur; cur="";
  paint(false);
  const won=g===target;
  if(won||guesses.length===6){
    done=true;
    if(daily) recordDaily(won);
    setTimeout(()=>finish(won),5*260+500);
  }
  saveDaily();
}
function nudge(msg){
  toast(msg);
  const row=board.children[guesses.length];
  row.classList.add("shake"); setTimeout(()=>row.classList.remove("shake"),420);
}
function finish(won){
  if(won){
    const tiles=board.children[guesses.length-1].children;
    for(let c=0;c<5;c++) setTimeout(()=>tiles[c].classList.add("dance"),c*80);
    toast(["Genius!","Magnificent!","Impressive!","Splendid!","Great!","Phew!"][guesses.length-1]);
  }else{
    toast(target.toUpperCase(),4000);
  }
  showStats();
}
function recordDaily(won){
  stats.played++;
  if(won){stats.wins++;stats.dist[guesses.length-1]++;
    stats.streak=(stats.lastDay===today-1)?stats.streak+1:1;
    stats.max=Math.max(stats.max,stats.streak);
  }else stats.streak=0;
  stats.lastDay=today;
  store("wl-stats",stats);
}
function showStats(){
  const el=document.getElementById("stats");
  document.getElementById("s-played").textContent=stats.played;
  document.getElementById("s-winpct").textContent=
    stats.played?Math.round(stats.wins/stats.played*100):0;
  document.getElementById("s-streak").textContent=stats.streak;
  document.getElementById("s-max").textContent=stats.max;
  const dist=document.getElementById("dist"), mx=Math.max(...stats.dist,1);
  dist.innerHTML="";
  stats.dist.forEach((n,i)=>{
    const d=document.createElement("div"); d.className="dbar";
    d.innerHTML=`${i+1} <i style="flex:0 0 ${8+n/mx*82}%">${n}</i>`;
    dist.appendChild(d);
  });
  document.getElementById("sharebtn").style.display=daily?"":"none";
  el.classList.add("show");
}
document.getElementById("sharebtn").addEventListener("click",()=>{
  const EM={good:"\u{1F7E9}",near:"\u{1F7E8}",absent:"⬜"};
  const grid=guesses.map(g=>score(g,target).map(r=>EM[r]).join("")).join("\n");
  const head=`Wordleish #${today+1} ${guesses[guesses.length-1]===target?guesses.length:"X"}/6`;
  navigator.clipboard.writeText(head+"\n\n"+grid)
    .then(()=>toast("Copied to clipboard"))
    .catch(()=>toast("Couldn't copy"));
});

function newGame(isDaily){
  daily=isDaily; done=false; cur=""; guesses=[];
  document.getElementById("stats").classList.remove("show");
  document.getElementById("modebtn").textContent=daily?"PRACTICE":"DAILY";
  document.getElementById("puzzno").textContent=daily?`#${today+1}`:"practice";
  if(daily){
    target=answerFor(today);
    const s=load("wl-day",null);
    if(s&&s.day===today){guesses=s.guesses;done=s.done;}
    if(done){paint(true);showStats();return;}
  }else{
    target=answerFor(Math.floor(Math.random()*2**31));
  }
  paint(true);
}
document.getElementById("modebtn").addEventListener("click",()=>newGame(!daily));
document.getElementById("againbtn").addEventListener("click",()=>newGame(false));

addEventListener("keydown",e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(e.key==="Enter") press("enter");
  else if(e.key==="Backspace") press("back");
  else if(/^[a-zA-Z]$/.test(e.key)) press(e.key.toLowerCase());
});

document.getElementById("puzzno").textContent=`#${today+1}`;
if(done){paint(true);showStats();} else paint(true);
</script>
</html>
