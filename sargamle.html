<style>
  :root{
    --bg:#141126; --panel:#1d1936; --line:#332c58; --text:#f2edfe;
    --muted:#8d84b8; --accent:#f0a63c; --accent-deep:#c97f18;
    --good:#4f9d5d; --near:#c9a24b; --absent:#3a3357; --onfb:#ffffff;
    --sa:#f0a63c; --re:#e97c61; --ga:#d95f8c; --ma:#a06fd6;
    --pa:#5b8fd9; --dha:#43a893; --ni:#8fb04e;
  }
  html{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
       min-height:100svh;display:flex;flex-direction:column;align-items:center}
  header{width:min(560px,100%);display:flex;align-items:center;gap:10px;
         padding:14px 16px 10px;border-bottom:1px solid var(--line)}
  h1{font-size:22px;margin:0;letter-spacing:.12em;font-weight:800;flex:1}
  h1 span{color:var(--accent)}
  .no{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .chip{font:600 12px/1 system-ui;letter-spacing:.06em;color:var(--text);
        background:var(--panel);border:1px solid var(--line);border-radius:6px;
        padding:9px 12px;cursor:pointer}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#241a05}
  button:focus-visible{outline:2px solid var(--text);outline-offset:2px}

  main{display:flex;flex-direction:column;align-items:center;gap:16px;
       padding:16px 10px 28px;width:min(560px,100%)}
  .help{color:var(--muted);font-size:13px;line-height:1.55;margin:0;max-width:52ch;text-align:center}
  .help b{color:var(--text)}

  .listen{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  #hear{font:700 14px/1 system-ui;letter-spacing:.14em;color:#241a05;
        background:var(--accent);border:0;border-radius:8px;padding:14px 26px;cursor:pointer}
  #hear:hover{background:#f7b95e}

  #board{display:grid;grid-template-rows:repeat(6,1fr);gap:6px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .tile{width:min(64px,16vw);aspect-ratio:1;border:2px solid var(--line);border-radius:8px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-weight:800;font-size:clamp(13px,3.6vw,17px);transition:transform .08s;
        background:var(--panel)}
  .tile small{font-weight:400;font-size:11px;opacity:.75}
  .tile.filled{border-color:var(--muted)}
  .tile.pop{transform:scale(1.07)}
  .tile.good{background:var(--good);border-color:var(--good);color:var(--onfb)}
  .tile.near{background:var(--near);border-color:var(--near);color:var(--onfb)}
  .tile.absent{background:var(--absent);border-color:var(--absent);color:var(--muted)}
  .tile.glow{box-shadow:0 0 0 3px var(--accent)}
  @media (prefers-reduced-motion: no-preference){
    .row.shake{animation:shake .4s}
    @keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    .tile.dance{animation:dance .45s ease}
    @keyframes dance{50%{transform:translateY(-12px)}}
  }

  #pads{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
  .pad{width:64px;height:72px;border:0;border-radius:10px;cursor:pointer;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
       font:800 16px/1 system-ui;color:#1c1408;box-shadow:0 3px 0 rgba(0,0,0,.35)}
  .pad small{font-weight:500;font-size:13px;opacity:.8}
  .pad:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)}
  .pad.lit{filter:brightness(1.25);transform:translateY(1px)}
  .ctl{display:flex;gap:10px}
  .ctl button{font:700 13px/1 system-ui;letter-spacing:.08em;border:1px solid var(--line);
              background:var(--panel);color:var(--text);border-radius:8px;
              padding:12px 22px;cursor:pointer}
  .ctl button:hover{border-color:var(--accent)}
  .ctl #submit{background:var(--accent);border-color:var(--accent);color:#241a05}

  #toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);
         background:var(--text);color:var(--bg);font-weight:700;
         padding:10px 16px;border-radius:8px;opacity:0;pointer-events:none;
         transition:opacity .2s;z-index:5;max-width:90vw;text-align:center}
  #toast.show{opacity:1}

  #done{width:min(430px,94%);border:1px solid var(--line);border-radius:10px;
        background:var(--panel);padding:14px 18px;display:none;
        flex-direction:column;gap:10px;text-align:center}
  #done.show{display:flex}
  #done p{margin:0;font-size:14px;color:var(--muted)}
  #done p b{color:var(--text)}
  .actions{display:flex;gap:10px}
  .actions button{flex:1;font:700 13px/1 system-ui;letter-spacing:.06em;border:0;
                  border-radius:6px;padding:12px;cursor:pointer;
                  background:var(--accent);color:#241a05}
  .actions button.alt{background:var(--absent);color:var(--text)}
</style>

<header>
  <h1>SARGAM<span>LE</span></h1>
  <span class="no" id="puzzno"></span>
  <button class="chip" id="ragabtn" title="switch scale"></button>
  <button class="chip" id="dronebtn" aria-pressed="true">&#9835; drone</button>
</header>
<main>
  <p class="help">Listen to the hidden <b>5-swara tune</b>, then guess it on the
    pads &mdash; you get 6 tries. <b style="color:var(--good)">Green</b> = right swara,
    right beat. <b style="color:var(--near)">Amber</b> = swara is in the tune,
    different beat. Replay the tune as often as you like; the tanpura drone
    holds <b>Sa</b> under everything so your ear has an anchor.</p>

  <div class="listen">
    <button id="hear">&#9654; HEAR THE TUNE</button>
  </div>

  <div id="board"></div>
  <div id="pads"></div>
  <div class="ctl">
    <button id="del">&#9003; DELETE</button>
    <button id="submit">SUBMIT</button>
  </div>

  <section id="done" aria-live="polite">
    <p id="doneline"></p>
    <div class="actions">
      <button id="sharebtn">SHARE</button>
      <button class="alt" id="againbtn">PRACTICE TUNE</button>
    </div>
  </section>
</main>
<div id="toast" role="status"></div>

<script>
"use strict";
// Just-intonation sargam over a Sa of C4. Ratios are the classical ones.
const ALL={
  sa :{n:"Sa", d:"सा", r:1,     c:"var(--sa)"},
  re :{n:"Re", d:"रे", r:9/8,   c:"var(--re)"},
  ga :{n:"Ga", d:"ग",       r:5/4,   c:"var(--ga)"},
  ma :{n:"Ma", d:"म",       r:4/3,   c:"var(--ma)"},
  pa :{n:"Pa", d:"प",       r:3/2,   c:"var(--pa)"},
  dha:{n:"Dha",d:"ध",       r:5/3,   c:"var(--dha)"},
  ni :{n:"Ni", d:"नी", r:15/8,  c:"var(--ni)"},
};
const RAGAS=[
  {
    name:"Bhupali",                                 // pentatonic, Bhupali-inspired grammar
    label:"Bhupali-inspired",
    swaras:["sa","re","ga","pa","dha"],
    grammar:{
      order:["sa","re","ga","pa","dha"],            // scale order (one octave)
      // Characteristic contiguous phrases, kept as data so more can be added freely.
      motifs:[
        ["sa","re","ga"],
        ["ga","re","sa"],
        ["sa","re","ga","re","sa"],
        ["ga","re","pa","ga"],
        ["pa","re","ga"],
        ["ga","pa","dha","pa"],
        ["dha","pa","ga","re"],
        ["dha","pa","ga","re","sa"],
      ],
      endBonus:{sa:6,ga:6,re:2,pa:2,dha:-4},        // resting-note preferences
      discouraged:[["dha","re"]],                   // same-octave Dha -> Re
      weights:{
        motif:8, step:2, skip:1, jump3:-2, jump4:-3,
        discouraged:-6, contourGood:3, contourFlip:-4
      }
    }
  },
  {
    name:"Shuddha Saptak",                          // full seven notes
    label:"Shuddha Saptak",
    swaras:["sa","re","ga","ma","pa","dha","ni"]
  },
];
const SA=261.63, LEN=5, TRIES=6, STEP=0.42, NOTE=0.5;

const store=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}};

const EPOCH=Date.UTC(2026,0,1);
const today=Math.floor((Date.now()-EPOCH)/86400000);
const mulberry=a=>()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};

// Plain random tune (no repeats back-to-back). Used by ragas without a grammar.
function makeTune(seed,raga){
  const rnd=mulberry(seed), s=raga.swaras, out=[];
  let prev=-1;
  for(let i=0;i<LEN;i++){
    let k=Math.floor(rnd()*s.length);
    if(k===prev) k=(k+1+Math.floor(rnd()*(s.length-1)))%s.length; // no immediate repeats
    out.push(s[k]); prev=k;
  }
  return out;
}

// ---------------------------------------------------------------- raga grammar
// A candidate is just `length` swaras drawn uniformly from `notes` using rng.
function generateCandidate(notes,length,rng){
  const out=[];
  for(let i=0;i<length;i++) out.push(notes[Math.floor(rng()*notes.length)]);
  return out;
}

// Does `sequence` contain `motif` as a contiguous run?
function containsMotif(sequence,motif){
  outer:
  for(let i=0;i+motif.length<=sequence.length;i++){
    for(let j=0;j<motif.length;j++) if(sequence[i+j]!==motif[j]) continue outer;
    return true;
  }
  return false;
}

// Signed step between two swaras along the raga's scale order (+ up, - down, 0 same).
function stepDist(a,b,order){ return order.indexOf(b)-order.indexOf(a); }

// Hard constraints. Returns true if the sequence is an acceptable Bhupali tune.
// `requireGa` is relaxed by the generator only if nothing else survives.
function isValidBhupaliSequence(seq,g,requireGa=true){
  const notes=g.order;
  // only allowed swaras
  if(seq.some(s=>!notes.includes(s))) return false;
  // count-based limits
  const cnt={};
  for(const s of seq) cnt[s]=(cnt[s]||0)+1;
  if(Object.values(cnt).some(c=>c>=4)) return false;       // one swara 4 or 5 times
  const distinct=Object.keys(cnt).length;
  if(distinct<=2) return false;                            // only two distinct swaras
  // no swara three times in a row
  for(let i=0;i+2<seq.length;i++)
    if(seq[i]===seq[i+1]&&seq[i+1]===seq[i+2]) return false;
  // not every transition a large jump
  let allBig=true;
  for(let i=0;i+1<seq.length;i++)
    if(Math.abs(stepDist(seq[i],seq[i+1],notes))<3){allBig=false;break;}
  if(allBig) return false;
  // must contain Ga (relaxable)
  if(requireGa&&!seq.includes("ga")) return false;
  return true;
}

// Score a candidate: higher is more Bhupali-like.
function scoreBhupaliSequence(seq,g){
  const w=g.weights, notes=g.order;
  let score=0;

  // characteristic fragments
  for(const m of g.motifs) if(containsMotif(seq,m)) score+=w.motif;

  // resting (final) note preference
  score+=g.endBonus[seq[seq.length-1]]||0;

  // transition scoring + collect contour directions
  const dirs=[];
  for(let i=0;i+1<seq.length;i++){
    const d=stepDist(seq[i],seq[i+1],notes), a=Math.abs(d);
    if(a===1) score+=w.step;
    else if(a===2) score+=w.skip;
    else if(a===3) score+=w.jump3;
    else if(a>=4) score+=w.jump4;
    // discouraged specific transitions (e.g. same-octave Dha -> Re)
    if(g.discouraged.some(([x,y])=>x===seq[i]&&y===seq[i+1])) score+=w.discouraged;
    dirs.push(Math.sign(d)); // +1 up, -1 down, 0 repeat
  }

  // contour: count direction changes among the non-repeat moves
  const moves=dirs.filter(d=>d!==0);
  let flips=0;
  for(let i=1;i<moves.length;i++) if(moves[i]!==moves[i-1]) flips++;
  if(flips<=2) score+=w.contourGood;    // reward calm contour (0-2 changes)
  else score+=w.contourFlip;            // penalize zig-zag after nearly every note

  return score;
}

// Generate many candidates, keep valid ones, score, and pick from the top slice.
// Deterministic for a given rng, so daily puzzles stay stable.
function generateRagaAwareTune(raga,length,rng){
  if(!raga.grammar) return makeTune(0,raga); // shouldn't happen; guarded by caller
  const g=raga.grammar, N=240;
  const cand=[];
  for(let i=0;i<N;i++) cand.push(generateCandidate(g.order,length,rng));

  // First pass requires Ga; if that empties the pool, relax that one rule.
  let valid=cand.filter(c=>isValidBhupaliSequence(c,g,true));
  if(!valid.length) valid=cand.filter(c=>isValidBhupaliSequence(c,g,false));
  if(!valid.length) return makeTune(Math.floor(rng()*2**31),raga); // last resort

  const scored=valid
    .map(seq=>({seq,score:scoreBhupaliSequence(seq,g)}))
    .sort((a,b)=>b.score-a.score);

  // Pick from roughly the top 10-20% (at least a few) using the same rng.
  const topN=Math.max(1,Math.min(scored.length,Math.ceil(scored.length*0.15)));
  return scored[Math.floor(rng()*topN)].seq;
}

// Route a raga through its grammar when it has one, else plain random.
function tuneFor(seed,raga){
  return raga.grammar ? generateRagaAwareTune(raga,LEN,mulberry(seed))
                      : makeTune(seed,raga);
}

let ragaIdx=load("sg-raga",0), daily=true;
let raga, target, guesses, cur, done;

// ---------------------------------------------------------------- audio
let ctx=null, droneNodes=null, droneOn=true;
function ac(){ if(!ctx) ctx=new AudioContext(); if(ctx.state==="suspended") ctx.resume(); return ctx; }

function pluck(swara,when,dur=NOTE){
  const a=ac(), f=SA*ALL[swara].r;
  const g=new GainNode(a,{gain:0});
  g.connect(a.destination);
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(0.22,when+0.02);
  g.gain.exponentialRampToValueAtTime(1e-3,when+dur+0.35);
  for(const [ratio,vol] of [[1,1],[2,0.28],[3,0.1]]){
    const o=new OscillatorNode(a,{frequency:f*ratio});
    const og=new GainNode(a,{gain:vol});
    o.connect(og).connect(g);
    o.start(when); o.stop(when+dur+0.4);
  }
}
function setDrone(on){
  droneOn=on;
  document.getElementById("dronebtn").classList.toggle("on",on);
  document.getElementById("dronebtn").setAttribute("aria-pressed",on);
  if(!on&&droneNodes){droneNodes.g.gain.linearRampToValueAtTime(1e-3,ac().currentTime+0.4);
    droneNodes=null;return;}
  if(on&&ctx&&!droneNodes) startDrone();
}
function startDrone(){
  if(droneNodes||!droneOn) return;
  const a=ac(), g=new GainNode(a,{gain:0});
  g.connect(a.destination);
  g.gain.linearRampToValueAtTime(0.045,a.currentTime+1.2);
  for(const f of [SA/2,SA*3/4,SA/2*1.003]){       // Sa, Pa-below, detuned Sa
    const o=new OscillatorNode(a,{frequency:f,type:"triangle"});
    const og=new GainNode(a,{gain:f===SA*3/4?0.5:1});
    o.connect(og).connect(g); o.start();
  }
  droneNodes={g};
}
document.getElementById("dronebtn").addEventListener("click",()=>setDrone(!droneOn));

let playTimer=[];
function clearGlow(){playTimer.forEach(clearTimeout);playTimer=[];
  document.querySelectorAll(".glow,.lit").forEach(e=>e.classList.remove("glow","lit"));}
function playSeq(seq,{tiles=null,pads=true}={}){
  const a=ac(); startDrone(); clearGlow();
  const t0=a.currentTime+0.1;
  seq.forEach((s,i)=>{
    pluck(s,t0+i*STEP);
    playTimer.push(setTimeout(()=>{
      clearGlowStep();
      if(pads){const p=document.getElementById("pad-"+s); if(p) p.classList.add("lit");}
      if(tiles){tiles[i].classList.add("glow");}
    },(0.1+i*STEP)*1000));
  });
  playTimer.push(setTimeout(clearGlowStep,(0.1+seq.length*STEP)*1000));
  function clearGlowStep(){document.querySelectorAll(".glow,.lit")
    .forEach(e=>e.classList.remove("glow","lit"));}
}
document.getElementById("hear").addEventListener("click",()=>playSeq(target,{pads:false}));

// ---------------------------------------------------------------- board+pads
const board=document.getElementById("board"), padbox=document.getElementById("pads");
for(let r=0;r<TRIES;r++){
  const row=document.createElement("div"); row.className="row";
  for(let c=0;c<LEN;c++){const t=document.createElement("div");t.className="tile";row.appendChild(t);}
  board.appendChild(row);
}
function buildPads(){
  padbox.innerHTML="";
  raga.swaras.forEach((s,i)=>{
    const w=ALL[s], b=document.createElement("button");
    b.className="pad"; b.id="pad-"+s; b.style.background=w.c;
    b.innerHTML=`${w.n}<small>${w.d}</small>`;
    b.title=`${w.n} (key ${i+1})`;
    b.addEventListener("click",()=>press(s));
    padbox.appendChild(b);
  });
}

function score(guess,tgt){
  const res=Array(LEN).fill("absent"), pool={};
  for(let i=0;i<LEN;i++) if(guess[i]!==tgt[i]) pool[tgt[i]]=(pool[tgt[i]]||0)+1;
  for(let i=0;i<LEN;i++){
    if(guess[i]===tgt[i]) res[i]="good";
    else if(pool[guess[i]]){res[i]="near";pool[guess[i]]--;}
  }
  return res;
}
function tileFill(t,s){
  const w=ALL[s];
  t.innerHTML=s?`${w.n}<small>${w.d}</small>`:"";
  t.classList.toggle("filled",!!s);
}
function paint(){
  for(let r=0;r<TRIES;r++){
    const tiles=board.children[r].children;
    const g=guesses[r], active=r===guesses.length&&!done?cur:null;
    for(let c=0;c<LEN;c++){
      const t=tiles[c]; t.className="tile";
      tileFill(t,(g&&g[c])||(active&&active[c])||"");
      if(g) t.classList.add(score(g,target)[c]);
    }
  }
}

// ---------------------------------------------------------------- game
let toastTimer=null;
function toast(msg,ms=1800){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer);
  if(ms) toastTimer=setTimeout(()=>el.classList.remove("show"),ms);
}
function press(s){
  if(done) return;
  pluck(s,ac().currentTime); startDrone();
  const p=document.getElementById("pad-"+s);
  p.classList.add("lit"); setTimeout(()=>p.classList.remove("lit"),180);
  if(cur.length<LEN){
    cur.push(s); paint();
    const t=board.children[guesses.length].children[cur.length-1];
    t.classList.add("pop"); setTimeout(()=>t.classList.remove("pop"),90);
  }
}
document.getElementById("del").addEventListener("click",()=>{
  if(!done){cur.pop();paint();}});
document.getElementById("submit").addEventListener("click",submit);

function submit(){
  if(done) return;
  if(cur.length<LEN){
    toast("Fill all 5 beats");
    const row=board.children[guesses.length];
    row.classList.add("shake"); setTimeout(()=>row.classList.remove("shake"),420);
    return;
  }
  guesses.push(cur); const g=cur; cur=[];
  paint();
  const row=board.children[guesses.length-1];
  playSeq(g,{tiles:[...row.children]});
  const won=g.every((s,i)=>s===target[i]);
  if(won||guesses.length===TRIES){done=true;setTimeout(()=>finish(won),LEN*STEP*1000+400);}
  saveDaily();
}
function finish(won){
  const line=document.getElementById("doneline");
  const names=target.map(s=>ALL[s].n).join(" ");
  if(won){
    const tiles=board.children[guesses.length-1].children;
    for(let c=0;c<LEN;c++) setTimeout(()=>tiles[c].classList.add("dance"),c*80);
    line.innerHTML=`<b>Wah!</b> Got it in ${guesses.length} &mdash; the tune was <b>${names}</b>.`;
  }else{
    line.innerHTML=`The tune was <b>${names}</b>. Hear it once more and it'll stick.`;
    playTimer.push(setTimeout(()=>playSeq(target,{pads:false}),800));
  }
  document.getElementById("sharebtn").style.display=daily?"":"none";
  document.getElementById("done").classList.add("show");
}
function saveDaily(){ if(daily) store("sg-day",{day:today,raga:ragaIdx,guesses,done}); }

document.getElementById("sharebtn").addEventListener("click",()=>{
  const EM={good:"\u{1F7E9}",near:"\u{1F7E8}",absent:"⬜"};
  const grid=guesses.map(g=>score(g,target).map(r=>EM[r]).join("")).join("\n");
  const won=guesses.length&&guesses[guesses.length-1].every((s,i)=>s===target[i]);
  const scoreLine=`Sargamle #${today+1} (${raga.name}) — ${won?guesses.length:"X"}/6`;
  const text=[
    "Think you can identify a tune by ear? \u{1F3B5}",
    "",
    scoreLine,
    "",
    grid,
    "",
    "Wordle for the ears: listen to a 5-swara tune and play it back.",
    "",
    "Try today's puzzle and share your score:",
    "https://kmcodes.github.io/AIFun/sargamle.html",
  ].join("\n");
  navigator.clipboard.writeText(text)
    .then(()=>toast("Copied to clipboard")).catch(()=>toast("Couldn't copy"));
});

function newGame(isDaily){
  daily=isDaily; raga=RAGAS[ragaIdx];
  cur=[]; guesses=[]; done=false; clearGlow();
  document.getElementById("done").classList.remove("show");
  document.getElementById("ragabtn").textContent=raga.label||raga.name;
  document.getElementById("puzzno").textContent=daily?`#${today+1}`:"practice";
  if(daily){
    target=tuneFor(today*7+ragaIdx,raga);
    const s=load("sg-day",null);
    if(s&&s.day===today&&s.raga===ragaIdx){guesses=s.guesses;done=s.done;}
  }else{
    target=tuneFor(Math.floor(Math.random()*2**31),raga);
  }
  buildPads(); paint();
  if(done){finishRestored();}
}
function finishRestored(){
  const won=guesses.length&&guesses[guesses.length-1].every((s,i)=>s===target[i]);
  finish(won);
}
document.getElementById("ragabtn").addEventListener("click",()=>{
  ragaIdx=(ragaIdx+1)%RAGAS.length; store("sg-raga",ragaIdx); newGame(daily);
});
document.getElementById("againbtn").addEventListener("click",()=>newGame(false));

addEventListener("keydown",e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  const i=parseInt(e.key,10);
  if(i>=1&&i<=raga.swaras.length) press(raga.swaras[i-1]);
  else if(e.key==="Enter") submit();
  else if(e.key==="Backspace"){if(!done){cur.pop();paint();}}
  else if(e.key===" "){e.preventDefault();playSeq(target,{pads:false});}
});

setDrone(true);
newGame(true);

// ---------------------------------------------------------------- dev diagnostics
// Never runs during play. In the console: sargamleDiag()  /  sargamleTest()
function sargamleDiag(n=10000){
  const raga=RAGAS[0], g=raga.grammar;
  let withMotif=0, dToR=0, rejected=0, dirTotal=0;
  const endDist={}, freq={}, seen=new Set();
  for(let i=0;i<n;i++){
    // count rejections at the per-candidate level using one throwaway rng
    const rng=mulberry((i+1)*2654435761>>>0);
    let tries=0;
    for(let k=0;k<240;k++){ if(!isValidBhupaliSequence(generateCandidate(g.order,LEN,rng),g,true)) tries++; }
    rejected+=tries;
    const t=tuneFor((i+1)*2654435761>>>0,raga);
    if(g.motifs.some(m=>containsMotif(t,m))) withMotif++;
    endDist[t[t.length-1]]=(endDist[t[t.length-1]]||0)+1;
    for(const s of t) freq[s]=(freq[s]||0)+1;
    for(let j=0;j+1<t.length;j++) if(t[j]==="dha"&&t[j+1]==="re"){dToR++;break;}
    const dirs=[];
    for(let j=0;j+1<t.length;j++) dirs.push(Math.sign(stepDist(t[j],t[j+1],g.order)));
    const moves=dirs.filter(d=>d!==0); let flips=0;
    for(let j=1;j<moves.length;j++) if(moves[j]!==moves[j-1]) flips++;
    dirTotal+=flips;
    seen.add(t.join("-"));
  }
  const r={
    sampled:n,
    pctWithMotif:+(100*withMotif/n).toFixed(1),
    endingDistribution:endDist,
    avgDirectionChanges:+(dirTotal/n).toFixed(2),
    pctWithDhaToRe:+(100*dToR/n).toFixed(2),
    rejectedCandidates:rejected,
    swaraFrequency:freq,
    uniqueTunes:seen.size,
  };
  console.table([r.endingDistribution]); console.log(r);
  return r;
}
function sargamleTest(){
  const raga=RAGAS[0], g=raga.grammar, allowed=g.order;
  const ok=(c,m)=>{ if(!c) throw new Error("ASSERT FAIL: "+m); };
  // same seed -> same tune
  ok(tuneFor(12345,raga).join()===tuneFor(12345,raga).join(),"seed determinism");
  ok(tuneFor(today*7,raga).join()===tuneFor(today*7,raga).join(),"daily determinism (no server)");
  // scan many tunes for invariants
  for(let i=0;i<2000;i++){
    const t=tuneFor(i*7+3,raga);
    ok(t.length===LEN,"length");
    ok(t.every(s=>allowed.includes(s)),"only allowed swaras");
    const cnt={}; t.forEach(s=>cnt[s]=(cnt[s]||0)+1);
    ok(Math.max(...Object.values(cnt))<4,"no swara 4+ times");
    for(let j=0;j+2<t.length;j++) ok(!(t[j]===t[j+1]&&t[j+1]===t[j+2]),"no triple repeat");
  }
  console.log("%csargamle: all assertions passed","color:#4f9d5d;font-weight:700");
  return true;
}
if(typeof window!=="undefined"){ window.sargamleDiag=sargamleDiag; window.sargamleTest=sargamleTest; }
